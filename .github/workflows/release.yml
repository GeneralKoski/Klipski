name: Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Decide se rilasciare e con quale tag.
  # - push di un tag v*      → rilascia con quel tag.
  # - push su main / manuale → legge la versione da tauri.conf.json e rilascia
  #                            solo se il tag corrispondente non esiste già
  #                            (cioè quando hai bumpato la versione).
  check:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.decide.outputs.release }}
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determina tag e se rilasciare
        id: decide
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            TAG="$GITHUB_REF_NAME"
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(jq -r .version desktop/src-tauri/tauri.conf.json)
            TAG="v$VERSION"
            if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
              echo "Tag $TAG già esistente: nessun rilascio."
              echo "release=false" >> "$GITHUB_OUTPUT"
            else
              echo "Nuova versione $TAG: rilascio."
              echo "release=true" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  # Windows e Linux: client Tauri (desktop/).
  desktop:
    needs: check
    if: needs.check.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Dipendenze Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - name: Installa dipendenze frontend
        working-directory: desktop
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ needs.check.outputs.tag }}
          releaseName: "Klipski ${{ needs.check.outputs.tag }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # macOS: app Swift nativa esistente.
  macos:
    needs: [check, desktop]
    if: needs.check.outputs.release == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Compila e assembla il bundle (senza installare)
        run: GITHUB_REF_NAME="${{ needs.check.outputs.tag }}" INSTALL=0 ./build.sh

      - name: Crea il DMG
        run: |
          VERSION="${TAG#v}"
          hdiutil create -volname Klipski \
            -srcfolder Klipski.app \
            -ov -format UDZO "Klipski_${VERSION}.dmg"
        env:
          TAG: ${{ needs.check.outputs.tag }}

      - name: Carica nella release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          draft: false
          files: Klipski_*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
