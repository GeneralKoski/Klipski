name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Windows e Linux: client Tauri (desktop/).
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            bundleGlob: "desktop/src-tauri/target/release/bundle/appimage/*.AppImage"
            assetName: "Klipski-linux.AppImage"
          - platform: windows-latest
            args: ""
            bundleGlob: "desktop/src-tauri/target/release/bundle/msi/*_en-US.msi"
            assetName: "Klipski-windows.msi"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Dipendenze Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - name: Installa dipendenze frontend
        working-directory: desktop
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
          args: ${{ matrix.args }}

      - name: Rinomina l'installer con nome stabile
        shell: bash
        run: cp "$(ls ${{ matrix.bundleGlob }} | head -n1)" "${{ matrix.assetName }}"

      - name: Carica nella release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          files: ${{ matrix.assetName }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # macOS: app Swift nativa esistente.
  macos:
    needs: desktop
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Compila e assembla il bundle (senza installare)
        run: INSTALL=0 ./build.sh

      - name: Crea il DMG
        run: |
          hdiutil create -volname Klipski \
            -srcfolder Klipski.app \
            -ov -format UDZO Klipski-macos.dmg

      - name: Carica nella release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          files: Klipski-macos.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
