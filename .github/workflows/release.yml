name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # Windows e Linux: client Tauri (desktop/).
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Dipendenze Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - name: Installa dipendenze frontend
        working-directory: desktop
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Klipski ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # macOS: app Swift nativa esistente.
  macos:
    needs: desktop
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Compila e assembla il bundle (senza installare)
        run: INSTALL=0 ./build.sh

      - name: Crea il DMG
        run: |
          hdiutil create -volname Klipski \
            -srcfolder Klipski.app \
            -ov -format UDZO Klipski-macos.dmg

      - name: Carica nella release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: Klipski-macos.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
