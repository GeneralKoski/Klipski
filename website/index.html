    <meta name="theme-color" content="#ffffff" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("klipski-theme");
          if (t !== "light" && t !== "dark") t = "dark";
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
